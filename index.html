<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#436b2a" />
  <title>Love Matcha Sales v1.0</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/puru-icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/puru-icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>

  <!--
    ใส่ Firebase config ของคุณตรงนี้
    วิธีหา config ดูใน README_SETUP_TH.md
  -->
  <script>
    window.LOVE_MATCHA_FIREBASE_CONFIG = {
      apiKey: "AIzaSyCn_iarrs-snOSZDJClNJ4YfAjuHni03dI",
      authDomain: "love-matcha-sale-3de45.firebaseapp.com",
      projectId: "love-matcha-sale-3de45",
      storageBucket: "love-matcha-sale-3de45.firebasestorage.app",
      messagingSenderId: "778024186668",
      appId: "1:778024186668:web:faa88ad2be17524bacb289"
    };
  </script>
</head>
<body>
  <div id="toast" class="toast" aria-live="polite"></div>

  <section id="configScreen" class="screen center-screen hidden">
    <div class="login-card">
      <img src="./icons/puru-icon-192.png" alt="Love Matcha" class="login-logo">
      <h1>Love Matcha</h1>
      <p class="version">v1.0</p>
      <div class="state error">
        ยังไม่ได้ใส่ Firebase config ในไฟล์ <b>index.html</b><br>
        เปิด README_SETUP_TH.md แล้วทำตามขั้นตอน “ตั้งค่า Firebase”
      </div>
    </div>
  </section>

  <section id="loginScreen" class="screen center-screen">
    <div class="login-card">
      <img src="./icons/puru-icon-192.png" alt="Love Matcha" class="login-logo">
      <h1 id="loginStoreName">Love Matcha</h1>
      <p class="version">v1.0</p>
      <div id="loginArea">
        <div class="loading">กำลังโหลดระบบ...</div>
      </div>
    </div>
  </section>

  <div id="mainApp" class="app hidden">
    <header class="topbar">
      <div class="brand">
        <img id="appLogo" src="./icons/puru-icon-192.png" alt="logo">
        <div>
          <b id="appTitle">Love Matcha</b>
          <small id="appSub">v1.0</small>
        </div>
      </div>
      <div class="user-mini">
        <span id="onlinePill" class="pill ok">ออนไลน์</span>
        <button id="logoutBtn" class="btn ghost small">ออก</button>
      </div>
    </header>

    <div id="offlineBanner" class="offline-banner hidden">
      ออฟไลน์อยู่ กรุณาต่ออินเตอร์เน็ตก่อน
    </div>

    <main id="pageContent" class="content">
      <div class="loading">กำลังโหลด...</div>
    </main>

    <nav id="bottomNav" class="bottom-nav" aria-label="เมนูหลัก"></nav>
  </div>

  <script type="module" src="./app.js"></script>
  <script>
    // กันหน้าโหลดค้างกรณีเปิดด้วย file:// หรืออินเทอร์เน็ตบล็อก Firebase CDN
    window.addEventListener('DOMContentLoaded', function(){
      setTimeout(function(){
        if (window.__LOVE_MATCHA_APP_BOOTED) return;
        var area = document.getElementById('loginArea');
        if (!area || !area.textContent.includes('กำลังโหลดระบบ')) return;
        var isFile = location.protocol === 'file:';
        area.innerHTML = isFile
          ? '<div class="state warn"><b>เปิดไฟล์แบบดับเบิลคลิกไม่ได้</b><br>ให้เปิดผ่าน GitHub Pages หรือดับเบิลคลิกไฟล์ <b>เปิดทดสอบในเครื่อง.bat</b> ใน ZIP แล้วเข้า http://localhost:8000</div>'
          : '<div class="state error"><b>โหลดระบบไม่สำเร็จ</b><br>กรุณาเช็กอินเทอร์เน็ต เพราะระบบต้องโหลด Firebase จาก CDN หรือเปิด Console เพื่อดู error</div>';
      }, 7000);
    });
  </script>
</body>
</html>
